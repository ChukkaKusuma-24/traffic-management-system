services:
  db:
    image: postgres:16-alpine
    container_name: traffic-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: traffic_management
      POSTGRES_USER: traffic_user
      POSTGRES_PASSWORD: traffic_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: traffic-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://traffic_user:traffic_pass@db:5432/traffic_management
      CLIENT_URL: http://localhost:8080
      CLIENT_URLS: http://localhost:8080
      JWT_SECRET: dev_docker_change_me
      SIMULATOR_ENABLED: "true"
      SIMULATOR_INTERVAL_MS: 4000
    ports:
      - "5000:5000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
        VITE_SOCKET_URL: http://localhost:8080
    container_name: traffic-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
